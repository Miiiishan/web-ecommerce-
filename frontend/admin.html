<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBC Admin Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Poppins, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        .admin-container {
            padding: 40px;
        }

        .admin-header {
            background: #6d0f1d;
            color: white;
            padding: 20px 40px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .admin-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 12px rgba(0,0,0,.1);
        }

        .admin-card h2 {
            margin-bottom: 15px;
            color: #6d0f1d;
        }

        .admin-card button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #6d0f1d;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .admin-card button:hover {
            opacity: .9;
        }
    </style>
</head>

<body>

    <div class="admin-header">
        <h1>🛠 FBC Admin Dashboard</h1>
        <p>Manage products, users, carts, and orders</p>
    </div>

    <div class="admin-container">

        <div class="admin-grid">

            <div class="admin-card">
                <h2>📦 Products</h2>
                <p>Manage marketplace products.</p>

                <button onclick="goProducts()">
                    Manage Products
                </button>
            </div>

            <div class="admin-card">
                <h2>🛒 Orders</h2>
                <p>View checkout orders.</p>

                <button onclick="goOrders()">
                    View Orders
                </button>
            </div>

            <div class="admin-card">
                <h2>👥 Users</h2>
                <p>Manage registered users.</p>

                <button onclick="goUsers()">
                    View Users
                </button>
            </div>

            <div class="admin-card">
                <h2>🏠 Homepage</h2>
                <p>Go back to marketplace.</p>

                <button onclick="goHome()">
                    Return Home
                </button>
            </div>

            <div class="admin-card">
                <h2>🚪 Logout</h2>
                <p>Sign out admin account.</p>

                <button onclick="logout()">
                    Logout
                </button>
            </div>

        </div>

    </div>

<script>
function goProducts() {
    window.location.href =
        "/admin-products.html";
}
function goOrders() {
    alert("Orders page coming next");
}

function goUsers() {
    alert("Users management coming next");
}

function goHome() {
    window.location.href = "/";
}

async function logout() {

    await fetch('/logout', {
        method: 'POST',
        credentials: 'include'
    });

    window.location.href = "/";
}
</script>

</body>
</html>
