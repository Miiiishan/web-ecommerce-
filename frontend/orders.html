<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Orders</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body{
            font-family:Poppins,sans-serif;
            background:#f5f5f5;
            margin:0;
        }

        .container{
            max-width:900px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 4px 12px rgba(0,0,0,.1);
        }

        h1{
            text-align:center;
            color:#6d0f1d;
        }

        .order-card{
            border:1px solid #ddd;
            border-radius:10px;
            padding:20px;
            margin-bottom:20px;
        }

        .status{
            color:green;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>📦 My Orders</h1>

    <div id="ordersList"></div>

</div>

<script>

async function loadOrders() {

    const res = await fetch('/orders', {
        credentials:'include'
    });

    const orders = await res.json();

    const container =
        document.getElementById(
            'ordersList'
        );

    container.innerHTML = "";

    if (orders.length === 0) {
        container.innerHTML =
        `
            <h3>
                No orders yet.
            </h3>
        `;
        return;
    }
orders.forEach(order => {

    container.innerHTML += `

        <div class="order-card">

            <h3>
                Order #${order.id}
            </h3>

            <p>
                <b>Total:</b>
                ₱${order.total}
            </p>

            ${
                order.items
                ?

                `
                <div
                style="
                margin:15px 0;
                padding:15px;
                background:#fafafa;
                border-radius:12px;
                border:1px solid #eee;
                ">

                    <b>
                    📦 Items Bought:
                    </b>

                    <div
                    style="
                    margin-top:10px;
                    ">

                        ${
                            order.items
                            .split('|||')

                            .map(item =>

                            `
                            <div
                            style="
                            margin-bottom:6px;
                            ">

                            • ${item}

                            </div>
                            `

                            ).join('')
                        }

                    </div>

                </div>
                `

                :

                ''
            }

            <p>
                <b>Status:</b>

                <span class="status">

                    ${order.status}

                </span>
            </p>

            <p>
                <b>Date:</b>

                ${new Date(
                    order.created_at
                ).toLocaleString()}

            </p>

            ${
order.status === 'Approved'

?

`
<button
onclick="
viewOR(
${order.id}
)">

🧾 View Receipt

</button>
`

:

order.status === 'Refunded'

&&

order.refund_proof

?

`
<button
onclick="
window.open(
'${order.refund_proof}',
'_blank'
)
"
style="
background:#2196f3;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
">

💸 View Refund Proof

</button>
`

:

''          }

        </div>
    `;
});
    
}
function viewOR(id){

    window.location.href =
    '/receipt/' + id;
}


loadOrders();

</script>

</body>
</html>
