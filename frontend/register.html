<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Register - FBC Marketplace
    </title>

    <link rel="stylesheet"
          href="style.css">

    <style>
        body{
            font-family:
            Arial, sans-serif;
            background:#f5f5f5;
        }

        .auth-container{
            width:90%;
            max-width:450px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:
            0 4px 20px
            rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            color:#6d0f1d;
        }

        input,
        select{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:
            1px solid #ddd;
            border-radius:10px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#6d0f1d;
            color:white;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            opacity:.9;
        }

        p{
            text-align:center;
        }

        #studentFields,
        #staffFields{
            display:none;
        }
    </style>
</head>

<body>

<div class="auth-container">

    <h2>
        Create Account
    </h2>

    <input
    type="text"
    id="name"
    placeholder="Full Name">

    <!-- ACCOUNT TYPE -->
    <select
    id="user_type"
    onchange="
    toggleFields()
    ">

        <option value="">
            Select Account Type
        </option>

        <option value="Student">
            Student
        </option>

        <option value="Faculty">
            Faculty
        </option>

        <option value="Staff">
            Staff
        </option>

        <option value="Visitor">
            Visitor
        </option>

    </select>

    <!-- STUDENT FIELDS -->
    <div id="studentFields">

        <input
        type="text"
        id="student_id"
        placeholder="
        Student ID Number
        ">

        <input
        type="text"
        id="course"
        placeholder="Course">

        <select
        id="year_level">

            <option value="">
                Select Year Level
            </option>

            <option>
                1st Year
            </option>

            <option>
                2nd Year
            </option>

            <option>
                3rd Year
            </option>

            <option>
                4th Year
            </option>

        </select>

    </div>

    <!-- FACULTY / STAFF -->
    <div id="staffFields">

        <input
        type="text"
        id="job_title"
        placeholder="
        Job Title
        ">

    </div>

    <input
    type="email"
    id="email"
    placeholder="
    School Email
    ">

    <input
    type="password"
    id="password"
    placeholder="Password">

    <button
    onclick="
    registerUser()
    ">
        Register
    </button>

    <p>
        Already have
        an account?

        <a href="login.html">
            Login
        </a>
    </p>

</div>

<script>

function toggleFields(){

    const type =
        document
        .getElementById(
        'user_type'
        ).value;

    const studentFields =
        document
        .getElementById(
        'studentFields'
        );

    const staffFields =
        document
        .getElementById(
        'staffFields'
        );

    // hide first
    studentFields
    .style.display =
    'none';

    staffFields
    .style.display =
    'none';

    // show needed
    if(
        type ===
        'Student'
    ){
        studentFields
        .style.display =
        'block';
    }

    if(
        type ===
        'Faculty'
        ||
        type ===
        'Staff'
    ){
        staffFields
        .style.display =
        'block';
    }
}

async function
registerUser(){

    const name =
        document
        .getElementById(
        'name'
        ).value
        .trim();

    const user_type =
        document
        .getElementById(
        'user_type'
        ).value;

    const student_id =
        document
        .getElementById(
        'student_id'
        ).value
        .trim();

    const course =
        document
        .getElementById(
        'course'
        ).value
        .trim();

    const year_level =
        document
        .getElementById(
        'year_level'
        ).value;

    const job_title =
        document
        .getElementById(
        'job_title'
        ).value
        .trim();

    const email =
        document
        .getElementById(
        'email'
        ).value
        .trim();

    const password =
        document
        .getElementById(
        'password'
        ).value
        .trim();

    // ===================
    // BASIC VALIDATION
    // ===================

    if(
        !name ||
        !user_type ||
        !email ||
        !password
    ){
        alert(
        'Please fill out all required fields.'
        );
        return;
    }

    // ===================
    // STUDENT VALIDATION
    // ===================

    if(
        user_type ===
        'Student'
    ){

        if(
            !student_id ||
            !course ||
            !year_level
        ){
            alert(
            'Please complete all student information.'
            );
            return;
        }
    }

    // ===================
    // STAFF/FACULTY
    // ===================

    if(
        user_type ===
        'Faculty'
        ||
        user_type ===
        'Staff'
    ){

        if(
            !job_title
        ){
            alert(
            'Please enter your job title.'
            );
            return;
        }
    }

    try{

        const res =
            await fetch(
            '/register',
            {
                method:'POST',

                headers:{
                    'Content-Type':
                    'application/json'
                },

                body:JSON.stringify({

                    name,
                    user_type,
                    student_id,
                    course,
                    year_level,
                    job_title,
                    email,
                    password
                })
            });

        const data =
            await res.json();

        alert(
            data.message
        );

        if(
            data.success
        ){
            window.location.href =
            '/login.html';
        }

    }catch(err){

        console.log(err);

        alert(
        'Registration failed'
        );
    }
}
</script>

</body>
</html>
