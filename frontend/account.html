<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - FBC Marketplace</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body{
            font-family: Poppins, sans-serif;
            background:#f5f5f5;
            margin:0;
        }

        .account-container{
            width:90%;
            max-width:1100px;
            margin:40px auto;
        }

        .account-header{
            background:#6d0f1d;
            color:white;
            padding:30px;
            border-radius:15px;
            margin-bottom:30px;
        }

        .dashboard-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        .card{
            background:white;
            border-radius:15px;
            padding:25px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .card h2{
            color:#6d0f1d;
        }

        .cart-item{
            border-bottom:1px solid #ddd;
            padding:10px 0;
        }

        .button{
            background:#6d0f1d;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:10px;
            cursor:pointer;
            margin-top:10px;
        }

        .button:hover{
            opacity:.9;
        }

        .empty{
            color:gray;
        }

        @media(max-width:768px){
            .dashboard-grid{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>
<body>

<div class="account-container">

    <div class="account-header">
        <h1>👤 My Account</h1>
        <p id="welcomeText">Loading...</p>
    </div>

    <div class="dashboard-grid">

        <!-- USER INFO -->
        <div class="card">
            <h2>Account Information</h2>

            <p><strong>Name:</strong>
                <span id="userName">Loading...</span>
            </p>

            <p><strong>Email:</strong>
                <span id="userEmail">Loading...</span>
            </p>

            <p>✅ Logged In</p>

            <button class="button" onclick="logout()">
                Logout
            </button>
        </div>

        <!-- CART -->
        <div class="card">
            <h2>🛒 My Cart</h2>

            <div id="cartItems">
                Loading cart...
            </div>

            <h3 id="cartTotal"></h3>

            <button class="button"
                onclick="window.location.href='/shop.html'">
                Continue Shopping
            </button>
        </div>

        <!-- PURCHASE HISTORY -->
            <div class="card" style="grid-column: span 2;">
<button onclick="goOrders()">
     <h2>📦 Purchase History</h2>
</button>
</div>

<script>

async function loadAccount() {

    const res = await fetch('/account/user', {
        credentials:'include'
    });

    const data = await res.json();

    if (!data.loggedIn) {
        window.location.href = "/login.html";
        return;
    }

    document.getElementById("userName")
        .innerText = data.user.name;

    document.getElementById("userEmail")
        .innerText = data.user.email;

    document.getElementById("welcomeText")
        .innerText =
        `Welcome back, ${data.user.name}`;
}

function goOrders() {
    window.location.href =
        "/orders.html";
}

async function loadCart() {

    const res = await fetch('/cart', {
        credentials:'include'
    });

    const cart = await res.json();

    const container =
        document.getElementById("cartItems");

    const totalText =
        document.getElementById("cartTotal");

    container.innerHTML = "";

    let total = 0;

    if (cart.length === 0) {
        container.innerHTML =
            "<p class='empty'>Cart is empty.</p>";
        return;
    }

    cart.forEach(item => {

        total += item.price * item.quantity;

        container.innerHTML += `
            <div class="cart-item">
                <h4>${item.name}</h4>
                <p>₱${item.price}</p>
                <p>Qty: ${item.quantity}</p>
            </div>
        `;
    });

    totalText.innerText =
        `Total: ₱${total}`;
}

async function logout() {

    await fetch('/logout', {
        method:'POST',
        credentials:'include'
    });

    alert("Logged out");

    window.location.href = "/";
}

loadAccount();
loadCart();

</script>

</body>
</html>
