<!DOCTYPE html>
<html>
<head>
    <title>FBC Messages</title>
<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family:Arial,sans-serif;
        background:#f4f4f4;
        height:100vh;
        overflow:hidden;
    }

    .container{
        display:flex;
        flex-direction:column;
        height:100vh;
    }

    /* TOP BAR */

    .top-bar{
        background:#800000;
        color:white;
        padding:18px 25px;
        display:flex;
        align-items:center;
        gap:15px;
        border-bottom:4px solid #d4af37;
    }

    .back-btn{

        background:#d4af37;
        color:#800000;
        border:none;
        padding:10px 18px;
        border-radius:10px;
        cursor:pointer;
        font-weight:bold;
    }

    .back-btn:hover{
        opacity:0.9;
    }

    /* CHAT AREA */
.chat-area{

    flex:1;

    display:flex;

    flex-direction:column;

    background:#fffaf5;

    overflow:hidden;
    }

    .chat-header{
        background:white;
        padding:20px;
        border-bottom:2px solid #eee;
    }

    .chat-header h2{
        color:#800000;
    }
.messages{

    flex:1;

    overflow-y:auto;

    padding:25px;

    display:flex;

    flex-direction:column;

    gap:15px;

    min-height:0;

    scroll-behavior:smooth;
    }

    .message{
        max-width:70%;
        padding:16px;
        border-radius:18px;
        margin-bottom:18px;
        box-shadow:
        0 2px 8px
        rgba(0,0,0,0.08);
    }

    .incoming{
        background:white;
        border-left:
        5px solid #800000;
    }
.outgoing{

    background:#d4af37;

    margin-left:auto;

    color:black;

    border-right:
    5px solid #800000;
}

.incoming{

    background:white;

    border-left:
    5px solid #800000;
}

    .product-tag{
        background:#800000;
        color:white;
        display:inline-block;
        padding:6px 12px;
        border-radius:20px;
        margin-bottom:10px;
        font-size:12px;
    }

    .time{
        font-size:12px;
        margin-top:8px;
        opacity:0.7;
    }

    /* INPUT */

    .chat-input{
        background:white;
        padding:20px;
        display:flex;
        gap:10px;
        border-top:2px solid #eee;
    }

    .chat-input input{
        flex:1;
        padding:16px;
        border:2px solid #ddd;
        border-radius:12px;
        outline:none;
    }

    .chat-input button{
        background:#800000;
        color:white;
        border:none;
        border-radius:12px;
        padding:0 30px;
        cursor:pointer;
        font-weight:bold;
    }

</style>
</head>

<body>

<div class="container">

<div class="top-bar">

    <button
    class="back-btn"
    onclick="goBack()">

        ← Back

    </button>

    <h2>

        FBC Messages

    </h2>

</div>

<div class="chat-area">

    <div class="chat-header">

        <h2>
            Customer Support
        </h2>

    </div>

    <div
    class="messages"
    id="messages">

    </div>

    <div class="chat-input">

        <input
        id="messageInput"
        placeholder="Type your message...">

        <button
        onclick="sendMessage()">

            Send

        </button>

    </div>

</div>
</div>

<script>

function
goBack(){

    window.location.href =
    '/index.html';
}


async function
loadMessages(){

    try{

        const res =
        await fetch(
        '/messages'
        );

        const data =
        await res.json();

        const container =
        document.getElementById(
        'messages'
        );

        container.innerHTML='';

data.forEach(msg=>{

    const bubble =
    msg.is_admin_reply
    ?
    'incoming'
    :
    'outgoing';

    const sender =
    msg.is_admin_reply
    ?
    'FBC Admin'
    :
    'You';

    container.innerHTML +=
    `
    <div class="
    message ${bubble}">

        <strong>

            ${sender}

        </strong>

        <br><br>

        ${msg.message}

        <div class="
        time">

            ${
                new Date(
                msg.created_at
                ).toLocaleString()
            }

        </div>

    </div>
    `;
});

container.scrollTop =
container.scrollHeight;

    }catch(err){

        console.log(err);
    }
}


async function
sendMessage(){

    const input =
    document.getElementById(
    'messageInput'
    );

    const message =
    input.value.trim();

    if(!message)
    return;

    const res =
    await fetch(
    '/send-message',
    {

        method:'POST',

        headers:{
            'Content-Type':
            'application/json'
        },

        body:
        JSON.stringify({

            product_id:null,

            message

        })
    });

    const data =
    await res.json();

    if(data.success){

        input.value='';

        loadMessages();
    }
}

loadMessages();

setInterval(
loadMessages,
2000
);

</script>

</body>
</html>
