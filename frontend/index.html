<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBC Marketplace</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">

    <div class="logo">
        <h2>FBC Marketplace</h2>
    </div>

    <nav>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/shop.html">Products</a></li>
            <li><a href="/about.html">About Us</a></li>

        </ul>
    </nav>

    <div class="nav-actions">

<input
type="text"
placeholder="Search products..."
class="search-bar"
id="searchInput"

onkeypress="
if(event.key==='Enter')
searchProducts()
">

        <!-- LOGIN AREA -->
        <div id="authArea"></div>

        <!-- 👑 ADMIN BUTTON (hidden by default) -->
<button
id="adminBtn"
class="admin-panel-btn"
onclick="
window.location.href=
'/admin'
"
style="display:none;">

🛠 Admin Panel

</button>

<button class="cart-btn" onclick="goCart()">
    🛒 Cart
</button>

<button
class="message-btn"
onclick="goMessages()">

    💬

</button>

</header>

<!-- HERO -->
<section class="hero">

    <div class="hero-content">

        <h1>Fellowship Baptist College Marketplace</h1>

        <p>
            Wear the legacy. Live the excellence
        </p>

          <p class="tagline">Shaping lives since 1954</p>

        <button class="shop-btn" onclick="goShop()">
            Shop Now
        </button>

    </div>

</section>

<!-- SHOP CATEGORIES -->

<section class="categories">

    <h2>

        Shop Categories

    </h2>

    <div
    class="category-grid"

    id="shopCategories">

    </div>

</section>

<!-- FEATURED CATEGORIES -->

<section class="featured-products">

    <h2>

        ✨ Featured Categories

    </h2>

    <div
    class="products-grid"

    id="featuredCategories">

    </div>

</section>

<!-- FOOTER -->
<footer class="footer">
    <h3>FBC Marketplace</h3>
    <p>Fellowship Baptist College</p>
</footer>

<script>

function
searchProducts(){

    const keyword =
    document
    .getElementById(
    'searchInput'
    )
    .value
    .trim();

    window.location.href =
    '/shop.html?search='
    +
    encodeURIComponent(
    keyword
    );
}

// =====================
// NAVIGATION
// =====================
function goShop() {
    window.location.href = "/shop.html";
}

function goCart() {
    window.location.href = "/cart.html";
}

function goLogin() {
    window.location.href = "/login.html";
}

function goRegister() {
    window.location.href = "/register.html";
}

function goAccount() {
    window.location.href = "/account.html";
}

function goAdmin() {
    window.location.href = "/admin";
}

// =====================
// LOGOUT
// =====================
async function logout() {

    await fetch('/logout', {
        method: 'POST',
        credentials: 'include'
    });

    window.location.reload();
}

// =====================
// CHECK USER + ADMIN
// =====================
async function checkAuth() {

    try {

        const res = await fetch('/me', {
            credentials: 'include'
        });

        const data = await res.json();

        const authArea = document.getElementById("authArea");
        const adminBtn = document.getElementById("adminBtn");

        if (!authArea) return;

        if (data.loggedIn) {

            // USER UI
            authArea.innerHTML = `
                <button onclick="goAccount()" class="login-btn">
                    👤 ${data.name}
                </button>

                <button onclick="logout()" class="register-btn">
                    Logout
                </button>
            `;

            // 👑 SHOW ADMIN BUTTON ONLY IF ADMIN
            if (data.is_admin === 1) {
                adminBtn.style.display = "inline-block";
            }

        } else {

            authArea.innerHTML = `
                <button onclick="goLogin()" class="login-btn">
                    Login
                </button>

                <button onclick="goRegister()" class="register-btn">
                    Register
                </button>
            `;

            adminBtn.style.display = "none";
        }

    } catch (err) {
        console.log(err);
    }
}

async function
checkAdmin(){

    const res =
        await fetch(
        '/me',
        {
            credentials:
            'include'
        });

    const user =
        await res.json();

    if(
        user.loggedIn
        &&
        user.is_admin == 1
    ){

        document
        .getElementById(
        'adminBtn'
        )
        .style.display =
        'inline-block';
    }
}

checkAdmin();

async function
setMessageRoute(){

    try{

        const res =
        await fetch(
        '/current-user'
        );

        const user =
        await res.json();

        window.currentUser =
        user;

    }catch(err){

        console.log(err);
    }
}


function
goMessages(){

    if(
        window.currentUser &&
        window.currentUser.is_admin
    ){

        window.location.href =
        '/admin-messages';

    }else{

        window.location.href =
        '/messages-page';
    }
}


document.addEventListener(
"DOMContentLoaded",
()=>{

    checkAuth();

    setMessageRoute();
});

function
goBack(){

    window.location.href =
    '/index.html';
}
// =====================
// LOAD FEATURED
// CATEGORIES
// =====================
async function
loadFeaturedCategories(){

    const res =
    await fetch(
    '/categories'
    );

    const categories =
    await res.json();

    const featured =
    categories.filter(c=>

        c.featured == 1
        &&

        c.hidden != 1
    );

    const container =
    document
    .getElementById(
    'featuredCategories'
    );

    container.innerHTML =
    '';

    featured.forEach(cat=>{

        container.innerHTML +=
        `
        <div
        class="product-card">

            <img src="${
                cat.image
                ||
                'https://via.placeholder.com/250'
            }">

            <h3>

                ${cat.name}

            </h3>

            <button
            onclick="goShop()">

                View Category

            </button>

        </div>
        `;
    });
}

loadFeaturedCategories();
// =====================
// LOAD SHOP
// CATEGORIES
// =====================
async function
loadShopCategories(){

    const res =
    await fetch(
    '/categories'
    );

    const categories =
    await res.json();

    const visible =
    categories.filter(c=>

        c.hidden != 1
    );

    const container =
    document
    .getElementById(
    'shopCategories'
    );

    container.innerHTML =
    '';

    visible.forEach(cat=>{

        container.innerHTML +=
        `
        <div
        class="category-card"

        onclick="goShop()">

            <img src="${
                cat.image
                ||
                'https://via.placeholder.com/300'
            }"

            style="
            width:100%;
            height:150px;
            object-fit:cover;
            border-radius:14px;
            margin-bottom:10px;
            ">

            <h3>

                ${cat.name}

            </h3>

        </div>
        `;
    });
}

loadShopCategories();

</script>

</body>
</html>
